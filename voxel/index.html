<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voxel Generator | xrai.dev</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a12;color:#eee;font:14px/1.4 system-ui,sans-serif;overflow:hidden}
    #c{display:block;width:100vw;height:calc(100vh - 56px);cursor:grab}
    #c:active{cursor:grabbing}
    #bar{position:fixed;bottom:0;left:0;right:0;height:56px;background:#111;border-top:1px solid #333;
      display:flex;gap:.5rem;align-items:center;padding:0 1rem}
    #prompt{flex:1;background:#1a1a1a;border:1px solid #444;color:#eee;padding:.45em .75em;
      font:inherit;border-radius:4px;outline:none}
    #prompt:focus{border-color:#0066cc}
    button{padding:.45em 1em;background:#0066cc;border:none;color:#fff;cursor:pointer;
      border-radius:4px;font:inherit;white-space:nowrap}
    button:hover{background:#0088ff}
    #status{font-size:.8em;color:#888;min-width:160px}
    a.back{color:#666;text-decoration:none;font-size:.8em;white-space:nowrap}
    a.back:hover{color:#aaa}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="bar">
  <a class="back" href="/">← xrai.dev</a>
  <button id="btn-cam" title="Capture camera frame">📷</button>
  <input id="prompt" placeholder="rainforest, desert, mountain, ocean, swamp…" value="rainforest"/>
  <button id="btn">Generate</button>
  <span id="status">drag to orbit · scroll to zoom</span>
  <video id="vid" style="display:none;position:fixed;top:8px;right:8px;width:160px;border:1px solid #333;border-radius:4px;z-index:20" autoplay playsinline></video>
  <canvas id="snap" style="display:none"></canvas>
</div>
<script type="module">
// Dynamic load so we control timing
const _s = document.createElement('script');
_s.src = 'https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js';
_s.onerror = () => { document.getElementById('status').textContent = 'CDN load failed'; };
_s.onload = _init;
document.head.appendChild(_s);

function _init() {
const canvas = document.getElementById('c');
const status = document.getElementById('status');

const W = () => window.innerWidth;
const H = () => window.innerHeight - 56;

// renderer
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.setSize(W(), H());
function resize(){
  renderer.setSize(W(), H());
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12);
scene.fog = new THREE.Fog(0x0a0a12, 35, 80);

const camera = new THREE.PerspectiveCamera(50, W()/H(), 0.1, 200);

// lights
scene.add(new THREE.AmbientLight(0x334466, 2));
const sun = new THREE.DirectionalLight(0xfff5e0, 3);
sun.position.set(12, 20, 8);
sun.castShadow = true;
scene.add(sun);

// ground
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshLambertMaterial({color:0x121a12})
);
gnd.rotation.x = -Math.PI/2; gnd.receiveShadow = true;
scene.add(gnd);

// orbit
let sph = {th: Math.PI/4, ph: Math.PI/3.2, r: 32};
let drag = false, lm = {x:0,y:0};
function applyCam(){
  camera.position.set(
    sph.r*Math.sin(sph.ph)*Math.sin(sph.th),
    sph.r*Math.cos(sph.ph),
    sph.r*Math.sin(sph.ph)*Math.cos(sph.th)
  );
  camera.lookAt(0,2,0);
}
applyCam();
canvas.addEventListener('mousedown', e=>{drag=true;lm={x:e.clientX,y:e.clientY}});
window.addEventListener('mouseup', ()=>drag=false);
window.addEventListener('mousemove', e=>{
  if(!drag) return;
  sph.th -= (e.clientX-lm.x)*0.012;
  sph.ph = Math.max(0.15, Math.min(1.4, sph.ph-(e.clientY-lm.y)*0.012));
  lm={x:e.clientX,y:e.clientY}; applyCam();
});
canvas.addEventListener('wheel', e=>{
  sph.r = Math.max(8, Math.min(60, sph.r+e.deltaY*0.04));
  applyCam();
}, {passive:true});
// touch
let pt = null;
canvas.addEventListener('touchstart', e=>{pt=e.touches[0]; drag=true; lm={x:pt.clientX,y:pt.clientY}});
canvas.addEventListener('touchmove', e=>{
  if(!drag||!e.touches[0]) return; e.preventDefault();
  const t=e.touches[0];
  sph.th -= (t.clientX-lm.x)*0.012;
  sph.ph = Math.max(0.15,Math.min(1.4,sph.ph-(t.clientY-lm.y)*0.012));
  lm={x:t.clientX,y:t.clientY}; applyCam();
},{passive:false});
canvas.addEventListener('touchend', ()=>drag=false);

// materials
const M = {
  trunk:    new THREE.MeshLambertMaterial({color:0x6b4423}),
  oak:      new THREE.MeshLambertMaterial({color:0x2d7a1b}),
  palm:     new THREE.MeshLambertMaterial({color:0x3a9a2a}),
  pine:     new THREE.MeshLambertMaterial({color:0x1a4a1a}),
  fern:     new THREE.MeshLambertMaterial({color:0x1a5a0f}),
  cactus:   new THREE.MeshLambertMaterial({color:0x3a7a1a}),
  flower:   new THREE.MeshLambertMaterial({color:0xcc4466}),
  mushroom: new THREE.MeshLambertMaterial({color:0xcc6622}),
  rock:     new THREE.MeshLambertMaterial({color:0x556677}),
  snow:     new THREE.MeshLambertMaterial({color:0xddeeff}),
  water:    new THREE.MeshLambertMaterial({color:0x1a4488,transparent:true,opacity:.7}),
};
const GEO = new THREE.BoxGeometry(1,1,1);
let meshes = [];
function box(type,x,y,z,sx=1,sy=1,sz=1){
  const geo = (sx===1&&sy===1&&sz===1) ? GEO : new THREE.BoxGeometry(sx,sy,sz);
  const m = new THREE.Mesh(geo, M[type]||M.rock);
  m.position.set(x, y+sy/2, z);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m); meshes.push(m);
}

// plant builders
function oak(x,z,h=3+Math.floor(Math.random()*2)){
  for(let i=0;i<h;i++) box('trunk',x,i,z);
  for(let dx=-2;dx<=2;dx++) for(let dz=-2;dz<=2;dz++) for(let dy=0;dy<=2;dy++)
    if(Math.abs(dx)+Math.abs(dz)+Math.abs(dy)<=3 && Math.random()>.25) box('oak',x+dx,h+dy-1,z+dz);
}
function palm(x,z){
  const h=4+Math.floor(Math.random()*3);
  for(let i=0;i<h;i++) box('trunk',x,i,z,.4,.4,.4);// ... fronds
  [[-2,-1],[-1,-2],[2,-1],[1,-2],[-2,1],[-1,2],[2,1],[1,2]].forEach(([dx,dz])=>{
    box('palm',x+dx*.6,h-.3,z+dz*.6,1.4,.3,.3);
  });
}
function pine(x,z){
  const h=5+Math.floor(Math.random()*3);
  for(let i=0;i<h;i++) box('trunk',x,i,z,.5,.5,.5);
  for(let t=0;t<3;t++){const r=3-t,y=h-2+t;
    for(let dx=-r;dx<=r;dx++) for(let dz=-r;dz<=r;dz++)
      if(Math.abs(dx)+Math.abs(dz)<=r) box('pine',x+dx,y,z+dz);
  }
}
function cactus(x,z){
  const h=2+Math.floor(Math.random()*3);
  for(let i=0;i<h;i++) box('cactus',x,i,z,.5,1,.5);
  if(Math.random()>.4){const a=Math.random()>.5?1:-1;
    box('cactus',x+a,h-2,z,.5,1,.5);
    box('cactus',x+a,h-1,z,.5,1,.5);
  }
}
function fern(x,z){
  for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++)
    box('fern',x+dx*.5,0,z+dz*.5,.7,.25,.7);
}
function mushroom(x,z){
  box('trunk',x,0,z,.3,1,.3);
  box('mushroom',x,1,z,1.6,.35,1.6);
}
function rock(x,z){
  const s=.5+Math.random()*.9;
  box('rock',x,0,z,s,s*.7,s);
}
function flower(x,z){
  box('fern',x,0,z,.25,.6,.25);
  box('flower',x,0.5,z,.5,.5,.5);
}

const BUILDERS = {oak,palm,pine,cactus,fern,mushroom,rock,flower,tree:oak,plant:fern};

// biomes
const BIOMES = {
  rainforest:[{t:'oak',n:7},{t:'palm',n:5},{t:'fern',n:10},{t:'mushroom',n:5},{t:'flower',n:6}],
  jungle:    [{t:'oak',n:7},{t:'palm',n:5},{t:'fern',n:10},{t:'mushroom',n:5},{t:'flower',n:6}],
  forest:    [{t:'oak',n:10},{t:'pine',n:5},{t:'fern',n:8},{t:'mushroom',n:3},{t:'flower',n:5}],
  desert:    [{t:'cactus',n:9},{t:'rock',n:12}],
  mountain:  [{t:'pine',n:9},{t:'rock',n:12},{t:'fern',n:4}],
  arctic:    [{t:'pine',n:6},{t:'rock',n:10},{t:'snow',n:8}],
  beach:     [{t:'palm',n:7},{t:'flower',n:8},{t:'fern',n:5}],
  ocean:     [{t:'rock',n:8},{t:'fern',n:10},{t:'flower',n:6}],
  meadow:    [{t:'flower',n:14},{t:'fern',n:8},{t:'mushroom',n:3},{t:'oak',n:3}],
  swamp:     [{t:'oak',n:5},{t:'fern',n:12},{t:'mushroom',n:9},{t:'flower',n:3}],
  cave:      [{t:'mushroom',n:12},{t:'rock',n:15},{t:'fern',n:5}],
};

function parseBiome(text){
  const t = text.toLowerCase();
  for(const [k,v] of Object.entries(BIOMES)) if(t.includes(k)) return v;
  // keyword fallback — pick any plant types mentioned
  const out = [];
  for(const k of Object.keys(BUILDERS)) if(t.includes(k)) out.push({t:k,n:5+Math.floor(Math.random()*5)});
  return out.length ? out : BIOMES.forest;
}

// try Ollama (optional, graceful fallback)
const SCENE_SCHEMA = {
  type:'object', required:['items'],
  properties:{ items:{ type:'array', maxItems:6,
    items:{ type:'object', required:['t','n'],
      properties:{
        t:{type:'string', enum:['oak','palm','pine','cactus','fern','mushroom','rock','flower']},
        n:{type:'integer', minimum:3, maximum:12}
      }
    }
  }}
};
const PROMPT_MSG = p => `Generate a voxel scene for: "${p}". Pick up to 6 plant/object types with counts.`;

let _Ollama = null;
async function loadOllama(){
  if(!_Ollama){ const m = await import('https://esm.sh/ollama/browser'); _Ollama = m.Ollama; }
  return _Ollama;
}
function parseItems(content){
  try{ const d=JSON.parse(content); return Array.isArray(d.items)&&d.items.length?d.items:null; }catch{ return null; }
}
async function tryOllama(prompt){
  try{
    const Ollama = await Promise.race([loadOllama(), new Promise((_,r)=>setTimeout(()=>r(new Error('t')),4000))]);
    const req = {stream:false, format:SCENE_SCHEMA, messages:[{role:'user',content:PROMPT_MSG(prompt)}]};

    // 1. local
    try{
      const ollama = new Ollama({host:'http://127.0.0.1:11434'});
      const r = await ollama.chat({...req, model:'gemma4:e4b'});
      const items = parseItems(r.message.content);
      if(items){ status.textContent='ollama local'; return items; }
    }catch{}

    // 2. cloud — #key=YOUR_OLLAMA_API_KEY
    const key = new URLSearchParams(location.hash.slice(1)).get('key');
    if(key){
      const ollama = new Ollama({host:'https://ollama.com', headers:{Authorization:'Bearer '+key}});
      const r = await ollama.chat({...req, model:'gemma4'});
      const items = parseItems(r.message.content);
      if(items){ status.textContent='ollama cloud'; return items; }
    }
  }catch{}
  return null;
}

function placeScene(items){
  meshes.forEach(m=>scene.remove(m)); meshes=[];
  const placed=[];
  for(const {t,n} of items){
    const b = BUILDERS[t]||rock;
    for(let i=0;i<n;i++){
      let x,z,tries=0;
      do{ x=(Math.random()-.5)*26; z=(Math.random()-.5)*26; tries++; }
      while(tries<30 && placed.some(p=>Math.hypot(p[0]-x,p[1]-z)<2.8));
      placed.push([x,z]);
      b(x,z);
    }
  }
}

async function generate(){
  const prompt = document.getElementById('prompt').value.trim()||'forest';
  document.getElementById('btn').disabled = true;
  status.textContent = 'Trying local model…';

  let items = await tryOllama(prompt);
  if(!items){
    items = parseBiome(prompt);
    status.textContent = items.map(i=>i.t+'×'+i.n).join(' ');
  }
  placeScene(items);
  document.getElementById('btn').disabled = false;
}

// camera capture → vision → scene
let camStream = null;
const vid = document.getElementById('vid');
const snap = document.getElementById('snap');

async function captureBase64(){
  if(!camStream) camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  vid.srcObject=camStream; vid.style.display='block';
  await new Promise(r=>setTimeout(r,800));
  snap.width=vid.videoWidth||640; snap.height=vid.videoHeight||480;
  snap.getContext('2d').drawImage(vid,0,0);
  return snap.toDataURL('image/jpeg',0.7).split(',')[1];
}

async function visionDescribe(b64){
  const Ollama = await loadOllama();
  const ollama = new Ollama({host:'http://127.0.0.1:11434'});
  const r = await ollama.generate({model:'llava', stream:false,
    prompt:'Describe the natural landscape or plants in 3-5 words. Words only, no punctuation.',
    images:[b64]});
  return r.response.trim();
}

document.getElementById('btn-cam').addEventListener('click', async()=>{
  try{
    status.textContent='capturing…';
    const b64 = await captureBase64();
    status.textContent='vision…';
    const desc = await visionDescribe(b64);
    document.getElementById('prompt').value=desc;
    vid.style.display='none';
    generate();
  }catch(e){ status.textContent='cam: '+e.message; vid.style.display='none'; }
});

document.getElementById('btn').addEventListener('click', generate);
document.getElementById('prompt').addEventListener('keydown', e=>{ if(e.key==='Enter') generate(); });

// animate
(function loop(){ requestAnimationFrame(loop); renderer.render(scene,camera); })();

// initial scene
generate();
} // end _init
</script>
</body>
</html>
